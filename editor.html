<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown 发布台</title>
  <link rel="stylesheet" href="/css/editor-modern.css">
</head>
<body>
  <section id="loginShell" class="card auth">
    <h1>Markdown 发布台</h1>
    <p>后台写 Markdown，编译后即可部署。</p>
    <label>账号
      <input id="loginUser" type="text" placeholder="请输入账号" autocomplete="off">
    </label>
    <label>密码
      <input id="loginPass" type="password" placeholder="请输入密码" autocomplete="off">
    </label>
    <div class="toolbar">
      <button id="loginBtn" class="primary" type="button">登录</button>
      <a href="/">返回首页</a>
    </div>
    <p id="loginStatus" class="status"></p>
  </section>

  <div id="appShell" class="shell hidden">
    <header class="topbar">
      <div>
        <h1>Markdown 发布台</h1>
        <p>统一数据源：posts.json + markdown 文件。支持增量部署与强制全量覆盖同步。</p>
      </div>
      <div class="toolbar">
        <button id="toggleSidebarBtn" type="button">隐藏侧边栏</button>
        <a href="/" target="_blank" rel="noopener">访问前台</a>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </header>

    <section id="workspaceGrid" class="grid">
      <aside class="card sidebar">
        <h2>文章列表</h2>
        <label>搜索
          <input id="searchInput" type="text" placeholder="标题或 slug">
        </label>
        <div class="toolbar">
          <button id="newBtn" type="button">新建</button>
          <button id="deleteBtn" class="danger" type="button">删除</button>
        </div>
        <div id="postList" class="post-list"></div>
      </aside>

      <section class="card editor">
        <h2>编辑区</h2>
        <div class="row two">
          <label>标题
            <input id="title" type="text" placeholder="例如：从 0 到 1 搭建博客系统">
          </label>
          <label>Slug
            <input id="slug" type="text" placeholder="留空自动生成">
          </label>
        </div>

        <div class="row three">
          <label>发布日期
            <input id="publishDate" type="date">
          </label>
          <label>分类
            <input id="category" type="text" placeholder="技术, 架构">
          </label>
          <label>标签
            <input id="tags" type="text" placeholder="markdown, github-pages">
          </label>
        </div>

        <label>摘要
          <input id="excerpt" type="text" placeholder="留空则自动从正文提取">
        </label>

        <label>Markdown
          <textarea id="markdown" placeholder="# 开始写作"></textarea>
        </label>

        <div class="editor-actions">
          <button id="compileBtn" type="button">编译到内存数据库</button>
          <button id="previewBtn" type="button">预览</button>
        </div>

        <div id="previewBody" class="preview"></div>

        <section class="deploy-box">
          <h2>部署到 GitHub</h2>
          <div class="row three">
            <label>Owner
              <input id="owner" type="text" placeholder="kxkcx">
            </label>
            <label>Repo
              <input id="repo" type="text" placeholder="kxkcx.github.io">
            </label>
            <label>Branch
              <input id="branch" type="text" value="master">
            </label>
          </div>
          <label>Token
            <input id="token" type="password" placeholder="GitHub PAT (repo 权限)">
          </label>
          <label>
            <input id="forceSync" type="checkbox">
            强制同步：全量覆盖远程（保留 images、.github、CNAME/readme）
          </label>
          <p class="tip">勾选强制同步后，会删除远程中不在当前发布清单里的旧页面文件，用于彻底对齐站点。</p>
          <div class="toolbar">
            <button id="deployBtn" class="primary" type="button">部署到 GitHub</button>
          </div>
        </section>

        <p id="status" class="status">等待加载...</p>
      </section>
    </section>
  </div>

  <script src="/js/vendor/marked.min.js"></script>
  <script src="/js/editor-new.js"></script>
</body>
</html>
