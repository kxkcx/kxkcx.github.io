<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>coderkou | 博客</title>
  <meta name="description" content="一个可在线编译发布的 Markdown 博客站点。">
  <link rel="icon" href="/images/favicon-32x32-next.png">
  <link rel="stylesheet" href="/css/blog.css">
</head>
<body>
  <div id="siteLayout" class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <img class="avatar" src="/images/avatar.gif" alt="avatar">
        <h1 class="brand">coderkou</h1>
        <p class="slogan">Fake it Till You Make it.</p>
      </div>

      <div class="quick-stats">
        <div><strong id="statsPosts">0</strong><span>日志</span></div>
        <div><strong id="statsCategories">0</strong><span>分类</span></div>
        <div><strong id="statsTags">0</strong><span>标签</span></div>
      </div>

      <nav id="mainNav" class="nav">
        <a data-route="home" href="#/">首页</a>
        <a data-route="archives" href="#/archives">归档</a>
        <a data-route="categories" href="#/categories">分类</a>
        <a data-route="tags" href="#/tags">标签</a>
        <a data-route="editor" href="/editor.html">后台登录</a>
      </nav>

      <section class="side-section">
        <h3>最近文章</h3>
        <ul id="recentList" class="recent-list"></ul>
      </section>

      <section class="side-section">
        <h3>热门标签</h3>
        <ul id="tagCloud" class="term-list"></ul>
      </section>

      <section class="side-section">
        <h3>常用分类</h3>
        <ul id="categoryCloud" class="term-list"></ul>
      </section>
    </aside>

    <main class="content">
      <div class="content-topbar">
        <div class="content-eyebrow">Engineering Notes · Live Markdown Pipeline</div>
        <div class="content-actions">
          <button id="toggleSidebarBtn" type="button">收起侧栏</button>
          <a class="editor-link" href="/editor.html">进入发布台</a>
        </div>
      </div>
      <div id="appRoot" class="empty">加载中...</div>
      <footer class="footer">© 2026 coderkou · Rebuilt with a live markdown pipeline</footer>
    </main>
  </div>

  <script src="/js/vendor/marked.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
